<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MoveToon</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>

</head>


<body>

<div id="toolbar">

<h1>MoveToon</h1>

<label>Color</label>
<input type="color" id="colorPicker" value="#ff0088">

<label>Size</label>
<input type="range" id="sizePicker" min="2" max="50" value="12">

<label>Brush</label>

<select id="brushPicker">

<option value="normal">Normal</option>
<option value="liquid">Liquid</option>
<option value="electric">Electric</option>
<option value="smoke">Smoke</option>
<option value="energy">Energy</option>

</select>

<input type="file" id="bgUpload">

<button id="undoBtn">Undo</button>
<button id="redoBtn">Redo</button>

<button id="exportPNG">PNG</button>

</div>

<div id="canvasContainer"></div>

<script src="app.js"></script>

<script src="brushes/normal.js"></script>
<script src="brushes/liquid.js"></script>
<script src="brushes/electric.js"></script>
<script src="brushes/smoke.js"></script>
<script src="brushes/energy.js"></script>

</body>

</html>
